<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Bridge — Learn. Grow. Succeed.</title>
  <meta name="description"
    content="Skill Bridge is a student-focused learning aggregator platform. Discover free classes, paid courses, and certifications across engineering disciplines.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Satisfy&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=6">
</head>

<body>

  <!-- ========== OPENING ANIMATION ========== -->
  <div id="intro-screen">
    <!-- Shooting star: sits ABOVE the text -->
    <div id="shooting-star-container">
      <div id="star-trail"></div>
      <div id="star-element">★</div>
    </div>
    <div id="typed-text"></div>
    <div id="flash-overlay"></div>
  </div>

  <!-- ========== FLYING COMET (persists across intro → home transition) ========== -->
  <div id="flying-comet" class="flying-comet">
    <svg viewBox="0 0 160 30" width="120" height="22">
      <defs>
        <linearGradient id="comet-grad-fly" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0" />
          <stop offset="40%" style="stop-color:#7c3aed;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
        </linearGradient>
        <radialGradient id="comet-glow-fly" cx="50%" cy="50%" r="50%">
          <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.6" />
          <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0" />
        </radialGradient>
      </defs>
      <line x1="0" y1="15" x2="130" y2="15" stroke="url(#comet-grad-fly)" stroke-width="3" stroke-linecap="round" />
      <circle cx="140" cy="15" r="12" fill="url(#comet-glow-fly)" />
      <circle cx="140" cy="15" r="6" fill="#22d3ee" />
      <circle cx="140" cy="15" r="3" fill="#fff" opacity="0.9" />
    </svg>
  </div>

  <!-- ========== MAIN APPLICATION ========== -->
  <div id="app" class="hidden">

    <!-- Top Bar -->
    <header id="app-header">
      <div class="header-left">
        <button id="back-btn" class="icon-btn hidden" aria-label="Go back">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5" />
            <path d="M12 19l-7-7 7-7" />
          </svg>
        </button>
        <div class="header-brand">
          <svg class="header-logo" viewBox="0 0 120 20" width="36" height="12">
            <defs>
              <linearGradient id="comet-grad-header" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0" />
                <stop offset="40%" style="stop-color:#7c3aed;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
              </linearGradient>
            </defs>
            <line x1="0" y1="10" x2="100" y2="10" stroke="url(#comet-grad-header)" stroke-width="3"
              stroke-linecap="round" />
            <circle cx="105" cy="10" r="6" fill="#22d3ee" />
            <circle cx="105" cy="10" r="3" fill="#fff" opacity="0.9" />
          </svg>
          <h1 class="header-title"><span class="text-orange">Skill</span> <span class="text-white">Bridge</span></h1>
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Breadcrumb -->
    <nav id="breadcrumb" class="hidden">
      <span id="breadcrumb-text"></span>
    </nav>

    <!-- ===== PAGE: HOME ===== -->
    <section id="page-home" class="page active">
      <div class="page-inner">
        <div class="hero-section">
          <h2 class="hero-title">Discover Your<br><span class="gradient-text">Learning Path</span></h2>
          <p class="hero-subtitle">Explore free resources, premium courses & certifications across engineering
            disciplines.</p>
        </div>
        <div class="search-container">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="search-input" placeholder="Search subjects, courses..." autocomplete="off">
        </div>
        <div id="comet-landing" class="comet-landing-spot">
          <!-- Comet will land here -->
        </div>
        <div class="section-label">
          <span class="label-icon">🎓</span>
          <span>Explore the Subjects</span>
        </div>
        <div id="subjects-grid" class="card-grid"></div>
      </div>
    </section>

    <!-- ===== PAGE: SPECIALIZATIONS ===== -->
    <section id="page-specializations" class="page">
      <div class="page-inner">
        <div class="page-header-info">
          <div id="spec-icon" class="page-header-icon"></div>
          <h2 id="spec-title" class="page-title"></h2>
          <p id="spec-desc" class="page-desc"></p>
        </div>
        <div class="section-label">
          <span class="label-icon">🔬</span>
          <span>Choose a Specialization</span>
        </div>
        <div id="specializations-grid" class="card-grid"></div>
      </div>
    </section>

    <!-- ===== PAGE: LEARNING SECTIONS ===== -->
    <section id="page-learning" class="page">
      <div class="page-inner">
        <div class="page-header-info">
          <h2 id="learning-title" class="page-title"></h2>
          <p id="learning-desc" class="page-desc"></p>
        </div>
        <div class="tabs-container">
          <button class="tab active" data-tab="basics">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
            </svg>
            The Basics
          </button>
          <button class="tab" data-tab="pro">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon
                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            </svg>
            The Pro Way
          </button>
          <button class="tab" data-tab="certifications">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <path d="M3 9h18" />
              <path d="M9 21V9" />
            </svg>
            Certifications
          </button>
        </div>
        <div id="courses-container" class="courses-list"></div>
      </div>
    </section>

    <!-- ===== REDIRECT SCREEN ===== -->
    <section id="page-redirect" class="page">
      <div class="redirect-content">
        <svg class="redirect-logo" viewBox="0 0 300 40" width="200" height="28">
          <defs>
            <linearGradient id="comet-grad-redirect" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0" />
              <stop offset="40%" style="stop-color:#7c3aed;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
            </linearGradient>
          </defs>
          <line x1="0" y1="20" x2="270" y2="20" stroke="url(#comet-grad-redirect)" stroke-width="3"
            stroke-linecap="round" />
          <circle cx="275" cy="20" r="7" fill="#22d3ee" />
          <circle cx="275" cy="20" r="3.5" fill="#fff" opacity="0.9" />
        </svg>
        <h2 class="redirect-title"><span class="text-orange">Skill</span> <span class="text-white">Bridge</span></h2>
        <div class="redirect-spinner"></div>
        <p id="redirect-message" class="redirect-msg"></p>
        <div class="redirect-progress">
          <div id="redirect-bar" class="redirect-bar-fill"></div>
        </div>
        <p class="redirect-hint">You will be redirected automatically...</p>
      </div>
    </section>

    <!-- Bottom Nav -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-nav="home" id="nav-home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>Home</span>
      </button>
      <button class="nav-item" data-nav="explore" id="nav-explore">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <span>Explore</span>
      </button>
      <button class="nav-item" data-nav="favorites" id="nav-favorites">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
        </svg>
        <span>Favorites</span>
      </button>
      <button class="nav-item" data-nav="profile" id="nav-profile">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span>Profile</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>

</html>
